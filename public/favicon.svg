<!--
  Favicon — same visual idea as the hero in App.svelte: Polar's red heart on
  the left, Strava's orange "activity" zigzag on the right. Trademark-safe:
  heart + zigzag are generic shapes, not Polar's or Strava's actual logos.
  Both brand colors come from the public guidelines:
    Polar red    #DA291C
    Strava orange #FC4C02
  Designed at 32×32 to read at 16×16 favicon sizes; thick strokes hold up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- left half: filled heart in Polar red, sized to be obvious at 16px -->
  <path
    fill="#DA291C"
    d="M9 7 c-2.5 0 -4.5 2 -4.5 4.5 c0 4.2 5.5 7.7 8 9.4 c2.5 -1.7 8 -5.2 8 -9.4 c0 -2.5 -2 -4.5 -4.5 -4.5 c-1.7 0 -2.9 0.9 -3.5 2 c-0.6 -1.1 -1.8 -2 -3.5 -2 z"
  />
  <!-- right half: Strava-style zigzag/activity stroke in Strava orange.
       Two stacked V's sketched as a single polyline, evocative of the
       Strava mark without being it. -->
  <polyline
    fill="none"
    stroke="#FC4C02"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="20,8 23,15 26,8"
  />
  <polyline
    fill="none"
    stroke="#FC4C02"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="20,18 23,25 26,18"
  />
</svg>
